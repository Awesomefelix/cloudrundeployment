substitutions:
  _SERVICE_NAME: flxcloudrun
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/${PROJECT_ID}/gcp-api/gcp-api

steps:
  # 1. Build Docker image (Now handles both tags at once)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'
      - '-t'
      - '${_IMAGE}:latest'
      - '.'

  # 2. Deploy to Cloud Run (Pulls from the image built in Step 1)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--quiet' # Prevents the build from hanging on prompts

# This replaces your old 'Step 2'. Cloud Build handles the push for you.
images:
  - '${_IMAGE}:${SHORT_SHA}'
  - '${_IMAGE}:latest'

serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/389077935832@cloudbuild.gserviceaccount.com'
