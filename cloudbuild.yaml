# cloudbuild.yaml
# Triggered automatically on git push (connect via Cloud Build GitHub app)
# or manually: gcloud builds submit --config cloudbuild.yaml

substitutions:
  _SERVICE_NAME: gcp-api
  _REGION: us-central1
  _IMAGE: gcr.io/$PROJECT_ID/${_SERVICE_NAME}

steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - '${_IMAGE}:$SHORT_SHA'
      - '-t'
      - '${_IMAGE}:latest'
      - '.'

  # 2. Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_IMAGE}']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--add-cloudsql-instances=$PROJECT_ID:${_REGION}:your-instance-name'
      - '--set-env-vars=NODE_ENV=production'
      # Secrets are pulled from Secret Manager — set these up first:
      # gcloud secrets create DB_PASSWORD --data-file=-
      - '--set-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,DB_NAME=DB_NAME:latest,DB_USER=DB_USER:latest,CLOUD_SQL_INSTANCE_CONNECTION_NAME=CLOUD_SQL_INSTANCE_CONNECTION_NAME:latest'

images:
  - '${_IMAGE}:$SHORT_SHA'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
