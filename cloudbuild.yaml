substitutions:
  _SERVICE_NAME: flxcloudrun
  _REGION: us-central1
  _IMAGE: gcr.io/${PROJECT_ID}/gcp-api

steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - '${_IMAGE}:${SHORT_SHA}'
      - '-t'
      - '${_IMAGE}:latest'
      - '.'

  # 2. Push image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_IMAGE}']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'

serviceAccount: 'projects/project-e850148f-e9b2-4456-99d/serviceAccounts/389077935832@cloudbuild.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
